# Auto-create a git tag when workspace.package.version changes on main.
# This triggers the existing release.yml workflow (which builds binaries
# and publishes to crates.io).
name: Auto Tag

on:
  push:
    branches: [main]
    paths:
      - "Cargo.toml"

permissions:
  contents: write

jobs:
  tag:
    name: Tag version bump
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2  # need previous commit to detect changes

      - name: Check for version change
        id: version
        run: |
          # Extract current version from workspace Cargo.toml
          CURRENT=$(grep -m1 '^version' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"

          # Check if this version tag already exists
          if git rev-parse "v$CURRENT" >/dev/null 2>&1; then
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag
        if: steps.version.outputs.tag_exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.current }}"
          git tag "v$VERSION"
          git push origin "v$VERSION"
          echo "Created and pushed tag v$VERSION"
