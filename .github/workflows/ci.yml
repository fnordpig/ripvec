# Fast quality checks — runs on every push and PR.
# No linking or model downloads required.
name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # clippy --all-targets compiles benches/tests too; system openblas
      # is needed for the linker. The `cpu` feature is auto-enabled on Linux.
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libopenblas-dev
      - run: cargo clippy --all-targets -- -D warnings

  check:
    name: Check (${{ matrix.os }})
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            # Linux auto-enables `cpu` which needs openblas for linking
            apt: libopenblas-dev
          - os: macos-latest
            # macOS auto-enables `mlx` + `cpu-accelerate`, no apt needed
            apt: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        if: matrix.apt != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.apt }}
      - run: cargo check --workspace

  # Minimal MSRV smoke test (compile-check only, no tests)
  msrv:
    name: MSRV (1.88.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libopenblas-dev
      - run: cargo check --workspace
