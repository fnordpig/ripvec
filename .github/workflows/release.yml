# Build release binaries, publish GitHub release, and publish to crates.io.
#
# Two triggers:
# 1. Push to main with Cargo.toml change → detect version bump → tag → build → publish
# 2. Manual tag push (v*) → build → publish
name: Release

on:
  push:
    tags: ["v*"]
    branches: [main]
    paths:
      - "Cargo.toml"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # On main push: detect version bump and create tag
  # On tag push: extract version from tag
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.result.outputs.version }}
      should_release: ${{ steps.result.outputs.should_release }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine version and release status
        id: result
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            # Triggered by tag push — always release
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            # Triggered by main push — check if version changed
            CURRENT=$(grep -m1 '^version' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
            if git rev-parse "v$CURRENT" >/dev/null 2>&1; then
              echo "version=v$CURRENT" >> "$GITHUB_OUTPUT"
              echo "should_release=false" >> "$GITHUB_OUTPUT"
            else
              echo "version=v$CURRENT" >> "$GITHUB_OUTPUT"
              echo "should_release=true" >> "$GITHUB_OUTPUT"
              git tag "v$CURRENT"
              git push origin "v$CURRENT"
            fi
          fi

  build:
    name: Build (${{ matrix.name }})
    needs: [prepare]
    if: needs.prepare.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          # CPU-only Linux x86_64
          - name: linux-x86_64
            target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            features: ""
            suffix: ""
            container: ""
            apt: libopenblas-dev

          # CUDA Linux x86_64
          - name: linux-x86_64-cuda
            target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            features: "--features cuda"
            suffix: "-cuda"
            container: "nvidia/cuda:13.1.0-devel-ubuntu24.04"
            apt: ""

          # CPU-only Linux ARM64 (Graviton)
          - name: linux-arm64
            target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            features: ""
            suffix: ""
            container: ""
            apt: libopenblas-dev

          # CUDA Linux ARM64
          - name: linux-arm64-cuda
            target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            features: "--features cuda"
            suffix: "-cuda"
            container: "nvidia/cuda:13.1.0-devel-ubuntu24.04"
            apt: ""

          # macOS ARM64 (Apple Silicon — Metal + MLX auto-enabled)
          - name: macos-arm64
            target: aarch64-apple-darwin
            os: macos-latest
            features: ""
            suffix: ""
            container: ""
            apt: ""

    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container || null }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.version }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.name }}

      - name: Install system dependencies
        if: matrix.apt != ''
        run: |
          if command -v sudo &>/dev/null; then
            sudo apt-get update && sudo apt-get install -y ${{ matrix.apt }}
          else
            apt-get update && apt-get install -y ${{ matrix.apt }}
          fi

      - name: Build release binaries
        run: cargo build --release --workspace ${{ matrix.features }}

      - name: Package binaries
        run: |
          tag="${{ needs.prepare.outputs.version }}"
          staging="ripvec-${tag}-${{ matrix.target }}${{ matrix.suffix }}"
          mkdir -p "$staging"
          cp target/release/ripvec "$staging/" 2>/dev/null || true
          cp target/release/ripvec-mcp "$staging/" 2>/dev/null || true
          tar czf "${staging}.tar.gz" "$staging"
          echo "ASSET=${staging}.tar.gz" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: ${{ env.ASSET }}

  release:
    name: GitHub Release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Collect assets
        run: |
          mkdir -p release
          find artifacts -name '*.tar.gz' -exec cp {} release/ \;
          ls -lh release/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          generate_release_notes: true
          files: release/*

  publish:
    name: Publish to crates.io
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.version }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libopenblas-dev

      - name: Publish ripvec-core
        run: cargo publish -p ripvec-core --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish ripvec
        run: cargo publish -p ripvec --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish ripvec-mcp
        run: cargo publish -p ripvec-mcp --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
