# Build release binaries, publish GitHub release, and publish to crates.io.
# Triggered by version bump in workspace Cargo.toml on main, OR manual tag push.
name: Release

on:
  push:
    tags: ["v*"]
    branches: [main]
    paths:
      - "Cargo.toml"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # Detect version bump and create tag (only runs on main push, not tag push)
  tag:
    name: Auto Tag
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.current }}
      should_release: ${{ steps.version.outputs.tag_exists == 'false' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for version change
        id: version
        run: |
          CURRENT=$(grep -m1 '^version' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          if git rev-parse "v$CURRENT" >/dev/null 2>&1; then
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag
        if: steps.version.outputs.tag_exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.current }}"
          git tag "v$VERSION"
          git push origin "v$VERSION"

  # Resolve version for downstream jobs (works for both tag push and auto-tag)
  resolve:
    name: Resolve version
    needs: [tag]
    if: always() && (needs.tag.result == 'success' && needs.tag.outputs.should_release == 'true') || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - id: resolve
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "version=v${{ needs.tag.outputs.version }}" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build (${{ matrix.target }})
    needs: [resolve]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            apt: libopenblas-dev
          - target: aarch64-apple-darwin
            os: macos-latest
            apt: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve.outputs.version }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install system dependencies
        if: matrix.apt != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.apt }}

      - name: Build release binaries
        run: cargo build --release --workspace

      - name: Package binaries
        run: |
          tag="${{ needs.resolve.outputs.version }}"
          staging="ripvec-${tag}-${{ matrix.target }}"
          mkdir -p "$staging"
          cp target/release/ripvec "$staging/" 2>/dev/null || true
          cp target/release/ripvec-mcp "$staging/" 2>/dev/null || true
          tar czf "${staging}.tar.gz" "$staging"
          echo "ASSET=${staging}.tar.gz" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ env.ASSET }}

  release:
    name: Publish Release
    needs: [resolve, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect assets
        run: |
          mkdir -p release
          find artifacts -name '*.tar.gz' -exec cp {} release/ \;
          ls -lh release/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.version }}
          generate_release_notes: true
          files: release/*

  publish:
    name: Publish to crates.io
    needs: [resolve, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve.outputs.version }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libopenblas-dev

      # Publish in dependency order: core first, then binaries
      - name: Publish ripvec-core
        run: cargo publish -p ripvec-core --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish ripvec
        run: cargo publish -p ripvec --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish ripvec-mcp
        run: cargo publish -p ripvec-mcp --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
