[package]
name = "ripvec-mcp"
version = "0.1.0"
edition.workspace = true
license.workspace = true
description = "MCP server wrapping ripvec for Claude Code / Cursor integration"
publish = false

[[bin]]
name = "ripvec-mcp"
path = "src/main.rs"

[dependencies]
ripvec-core = { path = "../ripvec-core" }
rmcp.workspace = true
tokio.workspace = true
serde.workspace = true
schemars.workspace = true
anyhow.workspace = true
serde_json.workspace = true
tokenizers.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
notify = "8.2.0"

[features]
default = []
cuda = ["ripvec-core/cuda"]
mlx = ["ripvec-core/mlx"]

# Auto-enable platform-appropriate backends
[target.'cfg(target_os = "macos")'.dependencies]
ripvec-core = { path = "../ripvec-core", features = ["mlx", "cpu-accelerate"] }

[target.'cfg(not(target_os = "macos"))'.dependencies]
ripvec-core = { path = "../ripvec-core", features = ["cpu"] }

[lints]
workspace = true
